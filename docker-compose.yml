version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "80:3001"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
